name: Jenkins Release Handoff

on:
  push:
    tags:
      - '*release*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag to hand off to Jenkins, including refs/tags/ prefix optional.'
        required: true
        type: string

concurrency:
  group: ${{ github.workflow }}-${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref }}
  cancel-in-progress: false

permissions:
  contents: read
  statuses: write

jobs:
  handoff-to-jenkins:
    name: Trigger Jenkins Release
    runs-on: ubuntu-latest
    environment: build-check

    env:
      STATUS_CONTEXT: jenkins/deploy
      JENKINS_URL: ${{ vars.JENKINS_URL }}
      JENKINS_USER: ${{ vars.JENKINS_USER }}
      JENKINS_API_TOKEN: ${{ secrets.JENKINS_API_TOKEN }}
      JENKINS_JOB: ${{ vars.JENKINS_JOB_DEPLOY }}
      JENKINS_DEPLOY_TOKEN: ${{ secrets.JENKINS_BUILD_CHECK_TOKEN }}

    steps:
      - name: Resolve release ref
        id: release_ref
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            RAW_TAG='${{ inputs.tag }}'
            if [[ "$RAW_TAG" == refs/tags/* ]]; then
              REF_VALUE="$RAW_TAG"
              TAG_NAME="${RAW_TAG#refs/tags/}"
            else
              REF_VALUE="refs/tags/$RAW_TAG"
              TAG_NAME="$RAW_TAG"
            fi
          else
            REF_VALUE='${{ github.ref }}'
            TAG_NAME='${{ github.ref_name }}'
          fi

          echo "ref=$REF_VALUE" >> "$GITHUB_OUTPUT"
          echo "tag=$TAG_NAME" >> "$GITHUB_OUTPUT"

      - name: Resolve release sha
        id: release_sha
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const tag = process.env.RELEASE_TAG;
            if (!tag) {
              core.setFailed('Missing release tag.');
              return;
            }

            if (context.eventName !== 'workflow_dispatch') {
              core.setOutput('sha', context.sha);
              return;
            }

            const ref = await github.rest.git.getRef({
              owner: context.repo.owner,
              repo: context.repo.repo,
              ref: `tags/${tag}`
            });

            let sha = ref.data.object.sha;
            if (ref.data.object.type === 'tag') {
              const annotated = await github.rest.git.getTag({
                owner: context.repo.owner,
                repo: context.repo.repo,
                tag_sha: sha
              });
              sha = annotated.data.object.sha;
            }

            core.setOutput('sha', sha);
        env:
          RELEASE_TAG: ${{ steps.release_ref.outputs.tag }}

      - name: Mark commit status as pending
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            await github.rest.repos.createCommitStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              sha: process.env.RELEASE_SHA,
              state: 'pending',
              context: process.env.STATUS_CONTEXT,
              description: `Queued release ${process.env.RELEASE_TAG} in Jenkins`,
              target_url: process.env.JENKINS_URL || undefined
            });
        env:
          RELEASE_SHA: ${{ steps.release_sha.outputs.sha }}
          RELEASE_TAG: ${{ steps.release_ref.outputs.tag }}

      - name: Trigger Jenkins deploy
        shell: bash
        run: |
          if [ -z "$JENKINS_URL" ] || [ -z "$JENKINS_USER" ] || [ -z "$JENKINS_API_TOKEN" ] || [ -z "$JENKINS_JOB" ] || [ -z "$JENKINS_DEPLOY_TOKEN" ]; then
            echo "Missing Jenkins deploy configuration."
            exit 1
          fi

          ENCODED_JOB_PATH="$(python3 -c "import os, urllib.parse; raw=os.environ['JENKINS_JOB']; parts=[p for p in raw.split('/job/') if p]; print('/'.join('job/' + urllib.parse.quote(p, safe='') for p in parts))")"
          BUILD_URL="${JENKINS_URL%/}/${ENCODED_JOB_PATH}/buildWithParameters?token=${JENKINS_DEPLOY_TOKEN}"

          curl --fail --show-error --silent --location \
            --user "$JENKINS_USER:$JENKINS_API_TOKEN" \
            --request POST "$BUILD_URL" \
            --data-urlencode "GIT_SHA=${{ steps.release_sha.outputs.sha }}" \
            --data-urlencode "GIT_REF=${{ steps.release_ref.outputs.ref }}" \
            --data-urlencode "PR_NUMBER=" \
            --data-urlencode "REPO_FULL_NAME=${{ github.repository }}" \
            --data-urlencode "PR_URL=" \
            --data-urlencode "STATUS_CONTEXT=${STATUS_CONTEXT}"
