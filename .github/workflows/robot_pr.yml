# GitHub Actions Workflow: Jenkins Handoff
#
# This workflow runs on pull requests to the main branch.
# It does not build locally. Instead it:
# 1. Marks the commit status as pending.
# 2. Triggers a Jenkins job with PR/commit metadata.
# 3. Exits immediately so heavy CI work is done in Jenkins.
#
# Jenkins is expected to update the same GitHub status context
# to success or failure when the pipeline completes.

name: Jenkins Handoff

on:
  pull_request:
    branches:
      - main

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  statuses: write

jobs:
  handoff-to-jenkins:
    name: Trigger Jenkins
    runs-on: ubuntu-latest
    environment: build-check

    env:
      STATUS_CONTEXT: jenkins/build
      JENKINS_URL: ${{ vars.JENKINS_URL }}
      JENKINS_USER: ${{ vars.JENKINS_USER }}
      JENKINS_API_TOKEN: ${{ secrets.JENKINS_API_TOKEN }}
      JENKINS_JOB: ${{ vars.JENKINS_JOB }}
      JENKINS_BUILD_CHECK_TOKEN: ${{ secrets.JENKINS_BUILD_CHECK_TOKEN }}

    steps:
      - name: Mark commit status as pending
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            await github.rest.repos.createCommitStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              sha: context.payload.pull_request.head.sha,
              state: 'pending',
              context: process.env.STATUS_CONTEXT,
              description: 'Queued in Jenkins',
              target_url: process.env.JENKINS_URL || undefined
            });

      - name: Trigger Jenkins build
        shell: bash
        run: |
          if [ -z "$JENKINS_URL" ] || [ -z "$JENKINS_USER" ] || [ -z "$JENKINS_API_TOKEN" ] || [ -z "$JENKINS_JOB" ] || [ -z "$JENKINS_BUILD_CHECK_TOKEN" ]; then
            echo "Missing Jenkins configuration secrets."
            exit 1
          fi

          ENCODED_JOB_PATH="$(python3 -c "import os, urllib.parse; raw=os.environ['JENKINS_JOB']; parts=[p for p in raw.split('/job/') if p]; print('/'.join('job/' + urllib.parse.quote(p, safe='') for p in parts))")"

          BUILD_URL="${JENKINS_URL%/}/${ENCODED_JOB_PATH}/buildWithParameters?token=${JENKINS_BUILD_CHECK_TOKEN}"

          curl --fail --show-error --silent --location \
            --user "$JENKINS_USER:$JENKINS_API_TOKEN" \
            --request POST "$BUILD_URL" \
            --data-urlencode "GIT_SHA=${{ github.event.pull_request.head.sha }}" \
            --data-urlencode "GIT_REF=${{ github.event.pull_request.head.ref }}" \
            --data-urlencode "PR_NUMBER=${{ github.event.pull_request.number }}" \
            --data-urlencode "REPO_FULL_NAME=${{ github.repository }}" \
            --data-urlencode "PR_URL=${{ github.event.pull_request.html_url }}" \
            --data-urlencode "STATUS_CONTEXT=${STATUS_CONTEXT}"
